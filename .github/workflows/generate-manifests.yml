name: Generate asset manifests

on:
  push:
    branches: [main]
    paths:
      - 'assets/**'

jobs:
  manifests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate manifests
        run: node scripts/generate-manifests.js

      - name: Commit manifests if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/**/manifest.json
          git diff --cached --quiet || git commit -m "chore: update asset manifests [skip ci]"
          git push
