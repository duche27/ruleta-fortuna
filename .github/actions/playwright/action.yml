name: Setup Playwright
description: Install Playwright Chromium with browser cache (skips slow apt on cache hit)

runs:
  using: composite
  steps:
    - uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

    - shell: bash
      run: |
        if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = 'true' ]; then
          echo "Playwright cache hit — skipping system deps"
          npx playwright install chromium
        else
          echo "Playwright cache miss — installing browser + system deps"
          npx playwright install --with-deps chromium
        fi
