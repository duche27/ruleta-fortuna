name: Setup Playwright
description: Install Playwright Chromium and WebKit (browser cache + OS deps every run)

runs:
  using: composite
  steps:
    - uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

    - shell: bash
      run: |
        if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = 'true' ]; then
          echo "Playwright cache hit — browsers already downloaded"
          npx playwright install chromium webkit
        else
          echo "Playwright cache miss — downloading browsers"
          npx playwright install chromium webkit
        fi
        # WebKit on Linux needs apt packages; they are not in the browser cache.
        echo "Installing OS dependencies for Chromium and WebKit"
        npx playwright install-deps chromium webkit
