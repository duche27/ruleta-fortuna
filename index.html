<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta de la Fortuna Arribística</title>

    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel para compilar React en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Confetti para la victoria -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Perfil activo: cambia esta línea para usar otro amigo (ver profiles/example.js) -->
    <script src="profiles/albino.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
        }

        /* Animaciones básicas */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes jumpScare {
            0% {
                transform: scale(0.3) rotate(-10deg);
                opacity: 0;
            }
            70% {
                transform: scale(1.05) rotate(3deg);
                opacity: 1;
            }
            100% {
                transform: scale(1) rotate(2deg);
                opacity: 1;
            }
        }

        .animate-jump-scare {
            animation: jumpScare 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
<div id="root"></div>

<script type="text/babel">
    const {useState, useEffect, useMemo} = React;

    if (!window.RouletteProfile) {
        document.getElementById('root').innerHTML =
            '<div style="padding:2rem;font-family:sans-serif;color:#b91c1c">' +
            '<h1>No hay perfil cargado</h1>' +
            '<p>Edita el &lt;script src="profiles/..."&gt; en <code>index.html</code> para apuntar a un perfil válido.</p>' +
            '</div>';
        throw new Error('window.RouletteProfile is undefined');
    }

    const PROFILE = window.RouletteProfile;
    let BACKGROUND_IMAGE = PROFILE.images?.background || null;
    let FRIEND_IMAGES = Array.isArray(PROFILE.images?.friends) ? PROFILE.images.friends : [];
    let WRONG_ANSWER_IMAGE = PROFILE.images?.wrongAnswer || null;
    const INITIAL_TIME = PROFILE.initialTime;

    function isSupportedImageFile(fileName) {
        return /\.(?:avif|gif|jpe?g|png|webp)$/i.test(fileName);
    }

    function isSupportedAudioFile(fileName) {
        return /\.(?:m4a|mp3|mp4|mpeg|ogg|wav)$/i.test(fileName);
    }

    function buildAssetUrl(basePath, fileName) {
        return `${basePath}${encodeURIComponent(fileName)}`;
    }

    function detectGitHubPagesRepo() {
        const {hostname, pathname} = window.location;
        if (!hostname.endsWith('.github.io')) return null;

        const owner = hostname.replace(/\.github\.io$/, '');
        const pathParts = pathname.split('/').filter(Boolean);
        const repo = pathParts[0] || `${owner}.github.io`;

        return {owner, repo};
    }

    async function loadFolderImagesFromDirectoryListing(basePath) {
        // Requiere un servidor que devuelva HTML con <a href="..."> al acceder a una carpeta,
        // como el server.js incluido en el proyecto (node server.js).
        const r = await fetch(basePath);
        if (!r.ok) return [];

        const text = await r.text();
        const files = [...text.matchAll(/<a[^>]*href="([^"?#]+\.(?:avif|gif|jpe?g|png|webp))"/gi)]
            .map(m => decodeURIComponent(m[1]).split('/').pop())
            .filter(f => f && f !== '..' && f !== '.' && isSupportedImageFile(f));

        return files.map(f => buildAssetUrl(basePath, f));
    }

    async function loadFolderAudioFromDirectoryListing(basePath) {
        // Requiere un servidor que devuelva HTML con <a href="..."> al acceder a una carpeta,
        // como el server.js incluido en el proyecto (node server.js).
        const r = await fetch(basePath);
        if (!r.ok) return [];

        const text = await r.text();
        const files = [...text.matchAll(/<a[^>]*href="([^"?#]+\.(?:m4a|mp3|mp4|mpeg|ogg|wav))"/gi)]
            .map(m => decodeURIComponent(m[1]).split('/').pop())
            .filter(f => f && f !== '..' && f !== '.' && isSupportedAudioFile(f));

        return files.map(f => buildAssetUrl(basePath, f));
    }

    async function loadFolderImagesFromGitHubPages(basePath) {
        const repo = detectGitHubPagesRepo();
        if (!repo) return [];

        const apiUrl = `https://api.github.com/repos/${repo.owner}/${repo.repo}/contents/${basePath.replace(/\/$/, '')}`;
        const r = await fetch(apiUrl, {
            headers: {Accept: 'application/vnd.github+json'}
        });

        if (!r.ok) return [];

        const entries = await r.json();
        if (!Array.isArray(entries)) return [];

        return entries
            .filter(entry => entry && entry.type === 'file' && isSupportedImageFile(entry.name))
            .map(entry => buildAssetUrl(basePath, entry.name));
    }

    async function loadFolderAudioFromGitHubPages(basePath) {
        const repo = detectGitHubPagesRepo();
        if (!repo) return [];

        const apiUrl = `https://api.github.com/repos/${repo.owner}/${repo.repo}/contents/${basePath.replace(/\/$/, '')}`;
        const r = await fetch(apiUrl, {
            headers: {Accept: 'application/vnd.github+json'}
        });

        if (!r.ok) return [];

        const entries = await r.json();
        if (!Array.isArray(entries)) return [];

        return entries
            .filter(entry => entry && entry.type === 'file' && isSupportedAudioFile(entry.name))
            .map(entry => buildAssetUrl(basePath, entry.name));
    }

    async function loadFolderImages(profileName, folder) {
        const basePath = `assets/images/${profileName}/${folder}/`;
        const isGitHubPages = !!detectGitHubPagesRepo();
        for (const loader of (isGitHubPages
            ? [loadFolderImagesFromGitHubPages]
            : [loadFolderImagesFromDirectoryListing, loadFolderImagesFromGitHubPages]
        )) {
            try {
                const urls = await loader(basePath);
                if (urls.length > 0) return urls;
            } catch (e) { /* siguiente estrategia */ }
        }

        return [];
    }

    async function loadFolderAudio(basePath) {
        const isGitHubPages = !!detectGitHubPagesRepo();
        for (const loader of (isGitHubPages
            ? [loadFolderAudioFromGitHubPages]
            : [loadFolderAudioFromDirectoryListing, loadFolderAudioFromGitHubPages]
        )) {
            try {
                const urls = await loader(basePath);
                if (urls.length > 0) return urls;
            } catch (e) { /* siguiente estrategia */ }
        }
        return [];
    }

    async function loadSingleAudio(profileName, category, {fallbackToShared = false} = {}) {
        const profileBase = `assets/audio/${profileName}/${category}/`;
        const sharedBase = `assets/audio/shared/${category}/`;

        const urls = await loadFolderAudio(profileBase);
        if (urls.length > 0) return urls[0];

        // Solo se usa fallback compartido para categorías que realmente lo necesitan.
        if (fallbackToShared) {
            const sharedUrls = await loadFolderAudio(sharedBase);
            if (sharedUrls.length > 0) return sharedUrls[0];
        }

        return null;
    }

    async function loadSharedSingleAudio(category) {
        const sharedBase = `assets/audio/shared/${category}/`;
        const urls = await loadFolderAudio(sharedBase);
        return urls[0] || null;
    }

    async function resolveProfileAudio(profileName) {
        // Backwards-compatible: if a profile already specifies src, keep it.
        // Otherwise auto-pick the first file in each category folder.
        const audioCfg = PROFILE.audio || {};

        const [introSrc, correctSrc, incorrectSrc, passSrc] = await Promise.all([
            audioCfg.intro?.src ? Promise.resolve(audioCfg.intro.src) : loadSharedSingleAudio('intro'),
            audioCfg.correct?.src ? Promise.resolve(audioCfg.correct.src) : loadSingleAudio(profileName, 'correct'),
            // incorrect: solo desde assets/audio/<profile>/incorrect/ (nada compartido)
            audioCfg.incorrect?.src ? Promise.resolve(audioCfg.incorrect.src) : loadSingleAudio(profileName, 'incorrect', {fallbackToShared: false}),
            audioCfg.pass?.src ? Promise.resolve(audioCfg.pass.src) : loadSingleAudio(profileName, 'pass')
        ]);

        PROFILE.audio = {
            intro:     { ...(audioCfg.intro || {}),     src: introSrc },
            correct:   { ...(audioCfg.correct || {}),   src: correctSrc },
            incorrect: { ...(audioCfg.incorrect || {}), src: incorrectSrc },
            pass:      { ...(audioCfg.pass || {}),      src: passSrc }
        };
    }

    async function loadRandomPhotos(profileName) {
        const urls = await loadFolderImages(profileName, 'random');
        if (urls.length === 0) {
            console.warn(`No se encontraron fotos en assets/images/${profileName}/random/.`);
        }
        return urls;
    }

    async function loadSingleImage(profileName, folder) {
        const urls = await loadFolderImages(profileName, folder);
        return urls[0] || null;
    }

    // Carga las preguntas desde questions_and_answers/<name>.json
    async function loadQuestions(profileName) {
        try {
            const r = await fetch(`questions_and_answers/${profileName}.json`);
            if (r.ok) return await r.json();
        } catch (e) { /* archivo no encontrado */ }
        console.warn(`No se encontraron preguntas en questions_and_answers/${profileName}.json`);
        return [];
    }

    // Audio is single-channel: starting a sound stops the previous one.
    let CURRENT_AUDIO = null;

    const stopCurrentAudio = () => {
        if (!CURRENT_AUDIO) return;
        try {
            if (CURRENT_AUDIO.__cutoffHandler) {
                CURRENT_AUDIO.removeEventListener('timeupdate', CURRENT_AUDIO.__cutoffHandler);
                CURRENT_AUDIO.__cutoffHandler = null;
            }
            CURRENT_AUDIO.pause();
            CURRENT_AUDIO.currentTime = 0;
        } catch (e) { /* noop */ }
        CURRENT_AUDIO = null;
    };

    const playSound = (key, isMuted) => {
        if (isMuted) {
            stopCurrentAudio();
            return null;
        }

        const cfg = PROFILE.audio && PROFILE.audio[key];
        if (!cfg || !cfg.src) return null;

        stopCurrentAudio();

        try {
            const audio = new Audio(cfg.src);
            audio.volume = cfg.volume != null ? cfg.volume : 0.7;

            if (cfg.cutoffAt) {
                const cutoffHandler = function () {
                    if (this.currentTime >= cfg.cutoffAt) {
                        try { this.pause(); this.currentTime = 0; } catch (e) { /* noop */ }
                        this.removeEventListener('timeupdate', cutoffHandler);
                        this.__cutoffHandler = null;
                        if (CURRENT_AUDIO === this) CURRENT_AUDIO = null;
                    }
                };
                audio.__cutoffHandler = cutoffHandler;
                audio.addEventListener('timeupdate', cutoffHandler);
            }

            CURRENT_AUDIO = audio;
            audio.play().catch(e => console.log('Audio bloqueado por navegador', e));
            return audio;
        } catch (e) {
            CURRENT_AUDIO = null;
            return null;
        }
    };

    // --- ICONOS ---
    const Play = ({size = 24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <polygon points="5 3 19 12 5 21 5 3"/>
    </svg>;
    const Check = ({size = 24, className, strokeWidth = 3}) => <svg width={size} height={size} className={className}
                                                                    viewBox="0 0 24 24" fill="none"
                                                                    stroke="currentColor" strokeWidth={strokeWidth}
                                                                    strokeLinecap="round" strokeLinejoin="round">
        <polyline points="20 6 9 17 4 12"/>
    </svg>;
    const X = ({size = 24, className, strokeWidth = 3}) => <svg width={size} height={size} className={className}
                                                                viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                                strokeWidth={strokeWidth} strokeLinecap="round"
                                                                strokeLinejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>;
    const SkipForward = ({size = 24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
                                              stroke="currentColor" strokeWidth="2" strokeLinecap="round"
                                              strokeLinejoin="round">
        <polygon points="5 4 15 12 5 20 5 4"/>
        <line x1="19" y1="5" x2="19" y2="19"/>
    </svg>;
    const RotateCcw = ({size = 24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" strokeWidth="2" strokeLinecap="round"
                                            strokeLinejoin="round">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
    </svg>;
    const Volume2 = ({size = 24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
                                          stroke="currentColor" strokeWidth="2" strokeLinecap="round"
                                          strokeLinejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
    </svg>;
    const VolumeX = ({size = 24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
                                          stroke="currentColor" strokeWidth="2" strokeLinecap="round"
                                          strokeLinejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <line x1="23" y1="9" x2="17" y2="15"/>
        <line x1="17" y1="9" x2="23" y2="15"/>
    </svg>;
    const Clock = ({size = 24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
    </svg>;

    let gameData = Array.isArray(PROFILE.questions) ? PROFILE.questions : [];

    function RoscoGame() {
        const [questions] = useState(gameData);
        const [gameState, setGameState] = useState('setup');
        const [progress, setProgress] = useState([]);
        const [currentIndex, setCurrentIndex] = useState(0);
        const [currentPhotoIndex, setCurrentPhotoIndex] = useState(0);
        const [timeLeft, setTimeLeft] = useState(INITIAL_TIME);
        const [isMuted, setIsMuted] = useState(false);
        const [showJumpScare, setShowJumpScare] = useState(false);
        const hasFriendImages = FRIEND_IMAGES.length > 0;

        const getRandomPhotoIndex = (excludeIndex = -1) => {
            if (FRIEND_IMAGES.length === 0) return -1;
            if (FRIEND_IMAGES.length === 1) return 0;

            let nextIndex = excludeIndex;
            while (nextIndex === excludeIndex) {
                nextIndex = Math.floor(Math.random() * FRIEND_IMAGES.length);
            }
            return nextIndex;
        };

        const getFriendImage = (index) => {
            if (!hasFriendImages) return null;
            return FRIEND_IMAGES[index] || FRIEND_IMAGES[0] || null;
        };

        const showNextRandomPhoto = () => {
            if (!hasFriendImages) return;
            setCurrentPhotoIndex(prev => getRandomPhotoIndex(prev));
        };

        const startGame = () => {
            playSound('intro', isMuted);
            setProgress(questions.map(q => ({
                status: 'unanswered',
                answers: [],
                currentQ: 0
            })));
            setCurrentIndex(0);
            setCurrentPhotoIndex(getRandomPhotoIndex());
            setTimeLeft(INITIAL_TIME);
            setGameState('playing');
        };

        const resetGame = () => {
            setGameState('setup');
            setCurrentPhotoIndex(0);
            setTimeLeft(INITIAL_TIME);
        };

        useEffect(() => {
            let timer;
            if (gameState === 'playing' && timeLeft > 0) {
                timer = setInterval(() => {
                    setTimeLeft(prev => prev - 1);
                }, 1000);
            } else if (timeLeft === 0 && gameState === 'playing') {
                setGameState('finished');
            }
            return () => clearInterval(timer);
        }, [gameState, timeLeft]);

        const getNextIndex = (startIndex, currentProgress) => {
            let nextIdx = (startIndex + 1) % questions.length;
            let loopCount = 0;
            while (currentProgress[nextIdx].status === 'completed') {
                nextIdx = (nextIdx + 1) % questions.length;
                loopCount++;
                if (loopCount > questions.length) return -1;
            }
            return nextIdx;
        };

        const handleAnswer = (isCorrect) => {
            if (gameState !== 'playing') return;

            showNextRandomPhoto();

            if (!isCorrect) {
                setShowJumpScare(true);
                setTimeout(() => setShowJumpScare(false), 1500);
            }

            playSound(isCorrect ? 'correct' : 'incorrect', isMuted);

            const newProgress = [...progress];
            const currentLetterProg = {...newProgress[currentIndex]};

            currentLetterProg.answers = [...currentLetterProg.answers, isCorrect];
            currentLetterProg.currentQ += 1;

            if (currentLetterProg.currentQ >= questions[currentIndex].questions.length) {
                currentLetterProg.status = 'completed';
                newProgress[currentIndex] = currentLetterProg;

                const nextIdx = getNextIndex(currentIndex, newProgress);
                if (nextIdx === -1) {
                    setGameState('finished');
                } else {
                    setCurrentIndex(nextIdx);
                }
            } else {
                newProgress[currentIndex] = currentLetterProg;
            }
            setProgress(newProgress);
        };

        const handlePass = () => {
            if (gameState !== 'playing') return;
            showNextRandomPhoto();

            playSound('pass', isMuted);

            const newProgress = [...progress];
            newProgress[currentIndex].status = 'passed';

            const nextIdx = getNextIndex(currentIndex, newProgress);
            if (nextIdx === -1) {
                setGameState('finished');
            } else {
                setCurrentIndex(nextIdx);
                setProgress(newProgress);
            }
        };

        const handleLetterClick = (index) => {
            if (gameState === 'setup') return;
            const newProgress = [...progress];
            newProgress[index] = {status: 'unanswered', answers: [], currentQ: 0};
            setProgress(newProgress);

            if (gameState === 'finished') {
                setGameState('playing');
                setCurrentIndex(index);
            }
        };

        const stats = useMemo(() => {
            let correct = 0;
            let incorrect = 0;
            progress.forEach(p => {
                p.answers.forEach(ans => {
                    if (ans) correct++; else incorrect++;
                });
            });
            const totalQuestions = questions.reduce((sum, q) => sum + q.questions.length, 0);
            return {correct, incorrect, remaining: totalQuestions - correct - incorrect};
        }, [progress, questions]);

        useEffect(() => {
            if (gameState === 'finished' && stats.correct > 0) {
                const duration = 3 * 1000;
                const animationEnd = Date.now() + duration;
                const defaults = {startVelocity: 30, spread: 360, ticks: 60, zIndex: 0};

                const randomInRange = (min, max) => Math.random() * (max - min) + min;

                const interval = setInterval(function () {
                    const timeLeft = animationEnd - Date.now();

                    if (timeLeft <= 0) {
                        return clearInterval(interval);
                    }

                    const particleCount = 50 * (timeLeft / duration);
                    confetti({
                        ...defaults,
                        particleCount,
                        origin: {x: randomInRange(0.1, 0.3), y: Math.random() - 0.2}
                    });
                    confetti({
                        ...defaults,
                        particleCount,
                        origin: {x: randomInRange(0.7, 0.9), y: Math.random() - 0.2}
                    });
                }, 250);
            }
        }, [gameState]);

        useEffect(() => {
            const handleKeyDown = (e) => {
                if (gameState !== 'playing') return;
                const key = e.key.toLowerCase();
                if (key === 'enter' || key === 'c') {
                    handleAnswer(true);
                } else if (key === 'backspace' || key === 'i') {
                    handleAnswer(false);
                } else if (key === ' ' || key === 'p') {
                    e.preventDefault();
                    handlePass();
                }
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
        }, [gameState, currentIndex, progress, isMuted]);

        const renderCircle = () => {
            const radius = 140;
            const center = 160;

            return (
                <div className="relative w-80 h-80 mx-auto my-8">
                    <svg className="w-full h-full" viewBox="0 0 320 320">
                        {questions.map((q, index) => {
                            const angle = (index / questions.length) * 2 * Math.PI - Math.PI / 2;
                            const x = center + radius * Math.cos(angle);
                            const y = center + radius * Math.sin(angle);

                            let fillColor = '#3b82f6';
                            let strokeColor = 'none';
                            let strokeWidth = '0';
                            const prog = progress[index] || {status: 'unanswered', answers: []};

                            if (gameState === 'playing' && index === currentIndex) {
                                fillColor = '#eab308';
                                strokeColor = '#ca8a04';
                                strokeWidth = '3';
                            } else if (prog.status === 'completed') {
                                const allCorrect = prog.answers.every(a => a === true);
                                fillColor = allCorrect ? '#22c55e' : '#ef4444';
                            }

                            return (
                                <g key={q.letter} transform={`translate(${x}, ${y})`}
                                   onClick={() => handleLetterClick(index)}
                                   className={gameState !== 'setup' ? 'cursor-pointer hover:opacity-80 transition-opacity' : ''}>
                                    <circle r="14" fill={fillColor} stroke={strokeColor} strokeWidth={strokeWidth}
                                            className="transition-colors duration-300"/>
                                    <text x="0" y="5" textAnchor="middle" fill="white" fontSize="14" fontWeight="bold"
                                          className="pointer-events-none font-sans">
                                        {q.letter}
                                    </text>
                                    {q.questions.length > 1 && (
                                        <g transform="translate(10, -10)">
                                            <circle r="7" fill="#f97316" className="drop-shadow-sm"/>
                                            <text x="0" y="3" textAnchor="middle" fill="white" fontSize="9"
                                                  fontWeight="bold" className="pointer-events-none">
                                                {q.questions.length}
                                            </text>
                                        </g>
                                    )}
                                </g>
                            );
                        })}
                    </svg>

                    <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <div
                            className="absolute w-48 h-48 rounded-full z-0 opacity-20"
                            style={{
                                backgroundImage: `url('${BACKGROUND_IMAGE}')`,
                                backgroundSize: 'cover',
                                backgroundPosition: 'center',
                                backgroundColor: '#e2e8f0' /* Color de fondo si no hay imagen */
                            }}
                        />
                        <div className="relative z-10 flex flex-col items-center">
                            <div className="text-4xl font-black text-slate-800 drop-shadow-md">
                                {stats.correct}
                            </div>
                            <div
                                className="text-sm font-bold text-slate-600 bg-white/60 px-3 py-0.5 rounded-full backdrop-blur-sm mt-1">
                                Aciertos
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        return (
            <div className="min-h-screen p-4 sm:p-8 font-sans flex flex-col items-center relative overflow-hidden">
                <div
                    className="absolute inset-0 z-0 pointer-events-none"
                    style={{
                        backgroundImage: `url('${BACKGROUND_IMAGE}')`,
                        backgroundSize: 'cover',
                        backgroundPosition: 'center',
                        backgroundAttachment: 'fixed',
                        opacity: 0.1
                    }}
                />

                <div className="relative z-10 w-full flex flex-col items-center">
                    <header className="mb-8 text-center">
                        <h1 className="text-3xl sm:text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 drop-shadow-sm">
                            {PROFILE.title}
                        </h1>
                        {PROFILE.subtitle && (
                            <p className="text-slate-500 mt-2">{PROFILE.subtitle}</p>
                        )}
                    </header>

                    <div
                        className="w-full max-w-3xl bg-white/95 rounded-3xl shadow-xl overflow-hidden border border-slate-200">
                        <div
                            className="bg-slate-100 p-4 border-b border-slate-200 flex justify-between items-center px-6">
                            <div className="flex gap-6 items-center">
                                <div className="flex gap-4">
                                    <div className="flex items-center gap-2">
                                        <div className="w-3 h-3 rounded-full bg-green-500"></div>
                                        <span className="font-semibold">{stats.correct}</span></div>
                                    <div className="flex items-center gap-2">
                                        <div className="w-3 h-3 rounded-full bg-red-500"></div>
                                        <span className="font-semibold">{stats.incorrect}</span></div>
                                    <div className="flex items-center gap-2">
                                        <div className="w-3 h-3 rounded-full bg-blue-500"></div>
                                        <span className="font-semibold">{stats.remaining}</span></div>
                                </div>

                                {gameState === 'playing' && (
                                    <div
                                        className={`flex items-center gap-2 px-3 py-1 rounded-full font-mono font-bold ${timeLeft < 30 ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-slate-200 text-slate-700'}`}>
                                        <Clock size={16}/>
                                        {Math.floor(timeLeft / 60)}:{String(timeLeft % 60).padStart(2, '0')}
                                    </div>
                                )}
                            </div>

                            <div className="flex gap-2">
                                <button onClick={() => setIsMuted(!isMuted)}
                                        className="text-slate-500 hover:text-slate-700 transition-colors p-2 rounded-full hover:bg-slate-200"
                                        title={isMuted ? "Activar Sonido" : "Silenciar"}>
                                    {isMuted ? <VolumeX size={20}/> : <Volume2 size={20}/>}
                                </button>
                                {gameState !== 'setup' && (
                                    <button onClick={resetGame}
                                            className="text-slate-500 hover:text-slate-700 transition-colors p-2 rounded-full hover:bg-slate-200"
                                            title="Reiniciar Juego">
                                        <RotateCcw size={20}/>
                                    </button>
                                )}
                            </div>
                        </div>

                        <div className="p-6 sm:p-8 flex flex-col md:flex-row gap-8 items-center justify-center">
                            <div className="flex-shrink-0 w-full md:w-auto flex justify-center">
                                {renderCircle()}
                            </div>

                            <div className="flex-1 w-full max-w-md flex flex-col justify-center min-h-[300px]">
                                {gameState === 'setup' && (
                                    <div className="text-center space-y-6 fade-in">
                                        <div className="p-6 bg-blue-50 rounded-2xl border border-blue-100">
                                            <h2 className="text-2xl font-bold text-blue-800 mb-4">¿Listo para
                                                jugar?</h2>
                                            <p className="text-slate-600 mb-6">
                                                Se te leerá una definición para cada letra. Indica si tu respuesta es
                                                correcta, incorrecta o di "Pasapalabra" para dejarla para la siguiente
                                                ronda.
                                            </p>
                                            <button
                                                onClick={startGame}
                                                className="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-8 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 text-white font-bold rounded-xl shadow-lg transition-all transform hover:-translate-y-0.5"
                                            >
                                                <Play size={20}/>
                                                Comenzar Juego
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {gameState === 'playing' && progress.length > 0 && (
                                    <div className="flex flex-col h-full fade-in">
                                        <div className="mb-6 flex flex-col sm:flex-row gap-4">
                                            <div className="flex-1">
                                                <div className="flex items-center justify-between mb-2">
                                                    <div className="flex items-baseline gap-3">
                                                                <span
                                                                    className="text-5xl font-black text-yellow-500 drop-shadow-sm">
                                                                  {questions[currentIndex].letter}
                                                                </span>
                                                        <span
                                                            className="text-sm font-bold uppercase tracking-wider px-3 py-1 bg-slate-100 text-slate-600 rounded-full">
                                                                  {questions[currentIndex].questions[progress[currentIndex].currentQ].type === 'empieza' ? 'Empieza por' : 'Contiene la'}
                                                                </span>
                                                    </div>
                                                    {questions[currentIndex].questions.length > 1 && (
                                                        <div
                                                            className="text-sm font-bold text-orange-500 bg-orange-100 px-3 py-1 rounded-full">
                                                            {progress[currentIndex].currentQ + 1} / {questions[currentIndex].questions.length}
                                                        </div>
                                                    )}
                                                </div>

                                                <div
                                                    className="bg-slate-50 p-5 rounded-2xl border border-slate-200 shadow-inner mt-4 min-h-[120px] flex flex-col justify-center gap-4">
                                                    <p className="text-lg sm:text-xl font-medium leading-relaxed">
                                                        {questions[currentIndex].questions[progress[currentIndex].currentQ].question.replace(/\s*:\s*$/, '')}
                                                    </p>
                                                    <div
                                                        className="p-3 bg-indigo-50 rounded-xl border border-indigo-100">
                                                        <span
                                                            className="text-xs font-bold text-indigo-400 uppercase tracking-wider block mb-1">Respuesta esperada:</span>
                                                        <span className="text-lg font-bold text-indigo-700">
                                                                    {questions[currentIndex].questions[progress[currentIndex].currentQ].answer}
                                                                </span>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="w-full sm:w-32 h-40 sm:h-auto flex-shrink-0">
                                                <div
                                                    className="h-full bg-white p-2 rounded-xl shadow-md border border-slate-200 transform rotate-2 hover:rotate-0 transition-transform duration-300 overflow-hidden">
                                                    {getFriendImage(currentPhotoIndex) ? (
                                                        <img
                                                            src={getFriendImage(currentPhotoIndex)}
                                                            className="w-full h-full object-cover rounded shadow-inner"
                                                            alt="El novio"
                                                        />
                                                    ) : (
                                                        <div
                                                            className="w-full h-full rounded bg-slate-100 text-slate-400 flex items-center justify-center text-sm font-semibold text-center px-4">
                                                            Sin fotos
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="mt-auto space-y-4">
                                            <div className="grid grid-cols-2 gap-4">
                                                <button onClick={() => handleAnswer(true)}
                                                        className="group flex flex-col items-center justify-center p-4 bg-green-50 hover:bg-green-500 border-2 border-green-500 rounded-2xl transition-all duration-200 shadow-sm hover:shadow-md">
                                                    <div
                                                        className="bg-green-500 group-hover:bg-white p-2 rounded-full mb-2 transition-colors">
                                                        <Check size={24}
                                                               className="text-white group-hover:text-green-600 transition-colors"/>
                                                    </div>
                                                    <span
                                                        className="font-bold text-green-700 group-hover:text-white transition-colors">Correcto</span>
                                                </button>
                                                <button onClick={() => handleAnswer(false)}
                                                        className="group flex flex-col items-center justify-center p-4 bg-red-50 hover:bg-red-500 border-2 border-red-500 rounded-2xl transition-all duration-200 shadow-sm hover:shadow-md">
                                                    <div
                                                        className="bg-red-500 group-hover:bg-white p-2 rounded-full mb-2 transition-colors">
                                                        <X size={24}
                                                           className="text-white group-hover:text-red-600 transition-colors"/>
                                                    </div>
                                                    <span
                                                        className="font-bold text-red-700 group-hover:text-white transition-colors">Incorrecto</span>
                                                </button>
                                            </div>
                                            <button onClick={handlePass}
                                                    className="w-full flex items-center justify-center gap-2 p-4 bg-slate-100 hover:bg-blue-500 text-slate-700 hover:text-white border border-slate-300 hover:border-blue-500 rounded-2xl transition-all duration-200 font-bold text-lg">
                                                <SkipForward size={20}/> Pasapalabra
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {gameState === 'finished' && (
                                    <div className="text-center space-y-6 fade-in w-full max-w-xl mx-auto">
                                        <div
                                            className="p-8 bg-slate-50 rounded-3xl border border-slate-200 shadow-lg relative overflow-hidden">
                                            <div
                                                className="absolute top-0 right-0 p-4 opacity-10 transform rotate-12 scale-150">
                                                {getFriendImage(currentPhotoIndex) && (
                                                    <img
                                                        src={getFriendImage(currentPhotoIndex)}
                                                        className="w-32 h-32 object-cover rounded-full" alt=""/>
                                                )}
                                            </div>

                                            <h2 className="text-4xl font-black text-slate-800 mb-2 relative z-10">¡Juego
                                                Terminado!</h2>
                                            <p className="text-slate-500 mb-8 relative z-10">Aquí están tus resultados
                                                finales.</p>

                                            <div className="grid grid-cols-2 gap-4 mb-8">
                                                <div
                                                    className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                                                    <span
                                                        className="text-5xl font-black text-green-500 drop-shadow-sm">{stats.correct}</span>
                                                    <span
                                                        className="text-sm font-semibold uppercase tracking-wider text-slate-500 mt-2 block">Aciertos</span>
                                                </div>
                                                <div
                                                    className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                                                    <span
                                                        className="text-5xl font-black text-red-500 drop-shadow-sm">{stats.incorrect}</span>
                                                    <span
                                                        className="text-sm font-semibold uppercase tracking-wider text-slate-500 mt-2 block">Errores</span>
                                                </div>
                                            </div>

                                            <div className="mb-8 flex justify-center">
                                                <div
                                                    className="p-3 bg-white rounded-2xl shadow-xl border-4 border-white transform -rotate-2 hover:rotate-0 transition-transform duration-500 max-w-[200px]">
                                                    {getFriendImage(currentPhotoIndex) ? (
                                                        <img
                                                            src={getFriendImage(currentPhotoIndex)}
                                                            className="w-full h-auto rounded-lg"
                                                            alt="Celebración"
                                                        />
                                                    ) : (
                                                        <div
                                                            className="w-[176px] h-[176px] rounded-lg bg-slate-100 text-slate-400 flex items-center justify-center text-sm font-semibold text-center px-4">
                                                            Sin fotos
                                                        </div>
                                                    )}
                                                    <div
                                                        className="mt-3 font-handwriting text-slate-400 text-xs italic">#CaminoAlAltar
                                                    </div>
                                                </div>
                                            </div>

                                            <button onClick={resetGame}
                                                    className="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-8 py-4 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl shadow-md transition-all">
                                                <RotateCcw size={20}/> Volver a Jugar
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                    <footer
                        className="mt-8 text-center text-sm text-slate-600 bg-white/50 backdrop-blur-sm px-6 py-2 rounded-full relative z-10">
                        Nota: En esta versión tú actúas como el presentador.
                    </footer>
                </div>

                {showJumpScare && (
                    <div
                        className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm fade-in">
                        <div className="relative animate-jump-scare">
                            <img
                                src={WRONG_ANSWER_IMAGE}
                                className="max-h-[85vh] max-w-[90vw] rounded-3xl border-8 border-white shadow-[0_0_50px_rgba(239,68,68,0.5)]"
                                alt="¡INCORRECTO!"
                            />
                            <div
                                className="absolute -bottom-6 left-1/2 -translate-x-1/2 bg-red-600 text-white px-8 py-2 rounded-full font-black text-2xl shadow-xl transform -rotate-2">
                                ¡INCORRECTO!
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    (async () => {
        const [friends, questions, background, wrongAnswer] = await Promise.all([
            FRIEND_IMAGES.length === 0 ? loadRandomPhotos(PROFILE.name) : Promise.resolve(FRIEND_IMAGES),
            gameData.length === 0      ? loadQuestions(PROFILE.name)    : Promise.resolve(gameData),
            BACKGROUND_IMAGE ? Promise.resolve(BACKGROUND_IMAGE) : loadSingleImage(PROFILE.name, 'background'),
            WRONG_ANSWER_IMAGE ? Promise.resolve(WRONG_ANSWER_IMAGE) : loadSingleImage(PROFILE.name, 'wrong_answer')
        ]);

        FRIEND_IMAGES = friends;
        gameData = questions;
        BACKGROUND_IMAGE = background;
        WRONG_ANSWER_IMAGE = wrongAnswer;

        await resolveProfileAudio(PROFILE.name);

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RoscoGame/>);
    })();
</script>
</body>
</html>
