        body {

            }
            to {
                opacity: 1;
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes jumpScare {
            0% {
                transform: scale(0.3) rotate(-10deg);
                opacity: 0;
            }

                opacity: 1;

    function RoscoGame() {
        const [questions] = useState(gameData);
        const [gameState, setGameState] = useState('setup');
        const [progress, setProgress] = useState([]);
        const [currentIndex, setCurrentIndex] = useState(0);
        const [currentPhotoIndex, setCurrentPhotoIndex] = useState(0);
        const [timeLeft, setTimeLeft] = useState(INITIAL_TIME);
        const [isMuted, setIsMuted] = useState(false);
        const [showJumpScare, setShowJumpScare] = useState(false);
        const [isLoading, setIsLoading] = useState(true);
        const [hasSavedGame, setHasSavedGame] = useState(false);
        const [saveError, setSaveError] = useState(false);

        const stateRef = useRef({gameState, progress, currentIndex, timeLeft});
        const dbRef = useRef(null);
        const skipRemoteUpdate = useRef(false);
        stateRef.current = {gameState, progress, currentIndex, timeLeft};

        const persistState = useCallback(async (state) => {
            if (!state.progress?.length) return;
            if (!dbRef.current) {
                setSaveError(true);
                return;
            }
            try {
                skipRemoteUpdate.current = true;
                await dbRef.current.set(state);
                setSaveError(false);
            } catch (e) {
                skipRemoteUpdate.current = false;
                console.warn('No se pudo guardar el progreso', e);
                setSaveError(true);
            }
        }, []);

        useEffect(() => {
            if (!isFirebaseConfigured()) {
                setSaveError(true);
                setIsLoading(false);
                return;
            }

            if (!firebase.apps.length) {
                firebase.initializeApp(window.FIREBASE_CONFIG);
            }
            dbRef.current = firebase.database().ref(FIREBASE_STATE_PATH);

            const onRemoteState = (snapshot) => {
                if (skipRemoteUpdate.current) {
                    skipRemoteUpdate.current = false;
                    setIsLoading(false);
                    return;
                }
                const saved = snapshot.val();
                if (saved) {
                    applySavedState(saved, {
                        setProgress, setCurrentIndex, setTimeLeft, setGameState, setHasSavedGame
                    });
                } else {
                    setGameState('setup');
                    setProgress([]);
                    setCurrentIndex(0);
                    setTimeLeft(INITIAL_TIME);
                    setHasSavedGame(false);
                }
                setSaveError(false);
                setIsLoading(false);
            };

            const onError = (err) => {
                console.warn('Firebase:', err);
                setSaveError(true);
                setIsLoading(false);
            };

            dbRef.current.on('value', onRemoteState, onError);
            return () => dbRef.current?.off('value', onRemoteState);
        }, []);

        useEffect(() => {
            if (isLoading || !progress.length) return;
            const timer = setTimeout(() => persistState(stateRef.current), 300);
            return () => clearTimeout(timer);
        }, [gameState, progress, currentIndex, isLoading, persistState]);

        useEffect(() => {
            if (isLoading || gameState !== 'playing') return;
            const id = setInterval(() => persistState(stateRef.current), 20000);
            return () => clearInterval(id);
        }, [gameState, isLoading, persistState]);

        const playIntro = () => {
            if (isMuted) return;
            const intro = new Audio(INTRO_AUDIO);
            intro.volume = 0.6;
            intro.addEventListener('timeupdate', function () {
                if (this.currentTime >= 17) {
                    this.pause();
                }
            });
            intro.play().catch(e => console.log('Intro audio error:', e));
        };

        const startGame = (fresh = true) => {
            if (fresh) playIntro();
            const newProgress = createEmptyProgress(questions);
            setProgress(newProgress);
            setCurrentIndex(0);
            setTimeLeft(INITIAL_TIME);
            setGameState('playing');
            setHasSavedGame(true);
            if (fresh) {
                persistState({gameState: 'playing', progress: newProgress, currentIndex: 0, timeLeft: INITIAL_TIME});
            }
        };

        const continueGame = () => {
            if (gameState === 'finished') return;
            setGameState('playing');
            persistState({...stateRef.current, gameState: 'playing'});
        };

        const resetGame = async () => {
            try {
                if (dbRef.current) {
                    skipRemoteUpdate.current = true;
                    await dbRef.current.remove();
                }
            } catch (e) {
                console.warn('No se pudo borrar el progreso guardado', e);
            }
            setGameState('setup');
            setProgress([]);
            setCurrentIndex(0);
            setTimeLeft(INITIAL_TIME);
            setHasSavedGame(false);
            setSaveError(false);
        };

        useEffect(() => {
            let timer;
            if (gameState === 'playing' && timeLeft > 0) {
                timer = setInterval(() => {
                    setTimeLeft(prev => prev - 1);
                }, 1000);
            } else if (timeLeft === 0 && gameState === 'playing') {
                setGameState('finished');
            }
            return () => clearInterval(timer);
        }, [gameState, timeLeft]);

        const getNextIndex = (startIndex, currentProgress) => {
            let nextIdx = (startIndex + 1) % questions.length;
            let loopCount = 0;
            while (currentProgress[nextIdx].status === 'completed') {
                nextIdx = (nextIdx + 1) % questions.length;
                loopCount++;
                if (loopCount > questions.length) return -1;
            }
            return nextIdx;
        };

        const handleAnswer = (isCorrect) => {
            if (gameState !== 'playing') return;

            setCurrentPhotoIndex(prev => (prev + 1) % FRIEND_IMAGES.length);

            if (!isCorrect) {
                setShowJumpScare(true);
                setTimeout(() => setShowJumpScare(false), 1500);
            }

            try {
                if (!isMuted) {
                    const audioUrl = isCorrect ? 'assets/audio/gol_atletico.m4a' : 'assets/audio/incorrect.mp3';
                    const audio = new Audio(audioUrl);
                    audio.volume = 0.7;
                    audio.play().catch(e => console.log('Audio bloqueado por navegador', e));
                }
            } catch (e) {
            }

            const newProgress = [...progress];
            const currentLetterProg = {...newProgress[currentIndex]};

            currentLetterProg.answers = [...currentLetterProg.answers, isCorrect];
            currentLetterProg.currentQ += 1;

            if (currentLetterProg.currentQ >= questions[currentIndex].questions.length) {
                currentLetterProg.status = 'completed';
                newProgress[currentIndex] = currentLetterProg;

                const nextIdx = getNextIndex(currentIndex, newProgress);
                if (nextIdx === -1) {
                    setGameState('finished');
                } else {
                    setCurrentIndex(nextIdx);
                }
            } else {
                newProgress[currentIndex] = currentLetterProg;
            }
            setProgress(newProgress);
        };

        const handlePass = () => {
            if (gameState !== 'playing') return;
            setCurrentPhotoIndex(prev => (prev + 1) % FRIEND_IMAGES.length);

            try {
                if (!isMuted) {
                    const audio = new Audio(PASAPALABRA_AUDIO);
                    audio.volume = 0.7;
                    audio.play().catch(e => console.log('Audio bloqueado por navegador', e));
                }
            } catch (e) {
            }

            const newProgress = [...progress];
            newProgress[currentIndex].status = 'passed';

            const nextIdx = getNextIndex(currentIndex, newProgress);
            if (nextIdx === -1) {
                setGameState('finished');
            } else {
                setCurrentIndex(nextIdx);
                setProgress(newProgress);
            }
        };

        const handleLetterClick = (index) => {
            if (gameState === 'setup') return;
            const newProgress = [...progress];
            newProgress[index] = {status: 'unanswered', answers: [], currentQ: 0};
            setProgress(newProgress);

            if (gameState === 'finished') {
                setGameState('playing');
                setCurrentIndex(index);
            }
        };

        const stats = useMemo(() => {
            let correct = 0;
            let incorrect = 0;
            progress.forEach(p => {
                p.answers.forEach(ans => {
                    if (ans) correct++; else incorrect++;
                });
            });
            const totalQuestions = questions.reduce((sum, q) => sum + q.questions.length, 0);
            return {correct, incorrect, remaining: totalQuestions - correct - incorrect};
        }, [progress, questions]);

        useEffect(() => {
            if (gameState === 'finished' && stats.correct > 0) {
                const duration = 3 * 1000;
                const animationEnd = Date.now() + duration;
                const defaults = {startVelocity: 30, spread: 360, ticks: 60, zIndex: 0};

                const randomInRange = (min, max) => Math.random() * (max - min) + min;

                const interval = setInterval(function () {
                    const timeLeft = animationEnd - Date.now();

                    if (timeLeft <= 0) {
                        return clearInterval(interval);
                    }

                    const particleCount = 50 * (timeLeft / duration);
                    confetti({
                        ...defaults,
                        particleCount,
                        origin: {x: randomInRange(0.1, 0.3), y: Math.random() - 0.2}
                    });
                    confetti({
                        ...defaults,
                        particleCount,
                        origin: {x: randomInRange(0.7, 0.9), y: Math.random() - 0.2}
                    });
                }, 250);
            }
        }, [gameState]);

        useEffect(() => {
            const handleKeyDown = (e) => {
                if (gameState !== 'playing') return;
                const key = e.key.toLowerCase();
                if (key === 'enter' || key === 'c') {
                    handleAnswer(true);
                } else if (key === 'backspace' || key === 'i') {
                    handleAnswer(false);
                } else if (key === ' ' || key === 'p') {
                    e.preventDefault();
                    handlePass();
                }
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
        }, [gameState, currentIndex, progress, isMuted]);

        const renderCircle = () => {
            const radius = 140;
            const center = 160;

            return (
                <div className="relative w-80 h-80 mx-auto my-8">
                    <svg className="w-full h-full" viewBox="0 0 320 320">
                        {questions.map((q, index) => {
                            const angle = (index / questions.length) * 2 * Math.PI - Math.PI / 2;
                            const x = center + radius * Math.cos(angle);
                            const y = center + radius * Math.sin(angle);

                            let fillColor = '#3b82f6';
                            let strokeColor = 'none';
                            let strokeWidth = '0';
                            const prog = progress[index] || {status: 'unanswered', answers: []};

                            if (gameState === 'playing' && index === currentIndex) {
                                fillColor = '#eab308';
                                strokeColor = '#ca8a04';
                                strokeWidth = '3';
                            } else if (prog.status === 'completed') {
                                const allCorrect = prog.answers.every(a => a === true);
                                fillColor = allCorrect ? '#22c55e' : '#ef4444';
                            }

                            return (
                                <g key={q.letter} transform={`translate(${x}, ${y})`}
                                   onClick={() => handleLetterClick(index)}
                                   className={gameState !== 'setup' ? 'cursor-pointer hover:opacity-80 transition-opacity' : ''}>
                                    <circle r="14" fill={fillColor} stroke={strokeColor} strokeWidth={strokeWidth}
                                            className="transition-colors duration-300"/>
                                    <text x="0" y="5" textAnchor="middle" fill="white" fontSize="14" fontWeight="bold"
                                          className="pointer-events-none font-sans">
                                        {q.letter}
                                    </text>
                                    {q.questions.length > 1 && (
                                        <g transform="translate(10, -10)">
                                            <circle r="7" fill="#f97316" className="drop-shadow-sm"/>
                                            <text x="0" y="3" textAnchor="middle" fill="white" fontSize="9"
                                                  fontWeight="bold" className="pointer-events-none">
                                                {q.questions.length}
                                            </text>
                                        </g>
                                    )}
                                </g>
                            );
                        })}
                    </svg>

                    <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <div
                            className="absolute w-48 h-48 rounded-full z-0 opacity-20"
                            style={{
                                backgroundImage: `url('${BACKGROUND_IMAGE}')`,
                                backgroundSize: 'cover',
                                backgroundPosition: 'center',
                                backgroundColor: '#e2e8f0' /* Color de fondo si no hay imagen */
                            }}
                        />
                        <div className="relative z-10 flex flex-col items-center">
                            <div className="text-4xl font-black text-slate-800 drop-shadow-md">
                                {stats.correct}
                            </div>
                            <div
                                className="text-sm font-bold text-slate-600 bg-white/60 px-3 py-0.5 rounded-full backdrop-blur-sm mt-1">
                                Aciertos
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        if (isLoading) {
            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50 text-slate-600 font-sans">
                    <p className="text-lg font-medium">Cargando partida...</p>
                </div>
            );
        }

        return (
            <div className="min-h-screen p-4 sm:p-8 font-sans flex flex-col items-center relative overflow-hidden">
                <div
                    className="absolute inset-0 z-0 pointer-events-none"
                    style={{
                        backgroundImage: `url('${BACKGROUND_IMAGE}')`,
                        backgroundSize: 'cover',
                        backgroundPosition: 'center',
                        backgroundAttachment: 'fixed',
                        opacity: 0.1
                    }}
                />

                <div className="relative z-10 w-full flex flex-col items-center">
                    <header className="mb-8 text-center">
                        <h1 className="text-3xl sm:text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 drop-shadow-sm">
                            Ruleta de la Fortuna Arribística
                        </h1>
                        <p className="text-slate-500 mt-2">El juego del Rosco de Champions Leagues que lleva el
                            Atleti</p>
                    </header>

                    <div
                        className="w-full max-w-3xl bg-white/95 rounded-3xl shadow-xl overflow-hidden border border-slate-200">
                        <div
                            className="bg-slate-100 p-4 border-b border-slate-200 flex justify-between items-center px-6">
                            <div className="flex gap-6 items-center">
                                <div className="flex gap-4">
                                    <div className="flex items-center gap-2">
                                        <div className="w-3 h-3 rounded-full bg-green-500"></div>
                                        <span className="font-semibold">{stats.correct}</span></div>
                                    <div className="flex items-center gap-2">
                                        <div className="w-3 h-3 rounded-full bg-red-500"></div>
                                        <span className="font-semibold">{stats.incorrect}</span></div>
                                    <div className="flex items-center gap-2">
                                        <div className="w-3 h-3 rounded-full bg-blue-500"></div>
                                        <span className="font-semibold">{stats.remaining}</span></div>
                                </div>

                                {gameState === 'playing' && (
                                    <div
                                        className={`flex items-center gap-2 px-3 py-1 rounded-full font-mono font-bold ${timeLeft < 30 ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-slate-200 text-slate-700'}`}>
                                        <Clock size={16}/>
                                        {Math.floor(timeLeft / 60)}:{String(timeLeft % 60).padStart(2, '0')}
                                    </div>
                                )}
                            </div>

                            <div className="flex gap-2 items-center">
                                {saveError && (
                                    <span className="text-xs text-amber-600 font-medium hidden sm:inline"
                                          title="Configura firebase-config.js con tu proyecto Firebase">
                                        Sin guardar
                                    </span>
                                )}
                                <button onClick={() => setIsMuted(!isMuted)}
                                        className="text-slate-500 hover:text-slate-700 transition-colors p-2 rounded-full hover:bg-slate-200"
                                        title={isMuted ? "Activar Sonido" : "Silenciar"}>
                                    {isMuted ? <VolumeX size={20}/> : <Volume2 size={20}/>}
                                </button>
                                {gameState !== 'setup' && (
                                    <button onClick={resetGame}
                                            className="text-slate-500 hover:text-slate-700 transition-colors p-2 rounded-full hover:bg-slate-200"
                                            title="Reiniciar Juego">
                                        <RotateCcw size={20}/>
                                    </button>
                                )}
                            </div>
                        </div>

                        <div className="p-6 sm:p-8 flex flex-col md:flex-row gap-8 items-center justify-center">
                            <div className="flex-shrink-0 w-full md:w-auto flex justify-center">
                                {renderCircle()}
                            </div>

                            <div className="flex-1 w-full max-w-md flex flex-col justify-center min-h-[300px]">
                                {gameState === 'setup' && (
                                    <div className="text-center space-y-6 fade-in">
                                        <div className="p-6 bg-blue-50 rounded-2xl border border-blue-100">
                                            <h2 className="text-2xl font-bold text-blue-800 mb-4">¿Listo para
                                                jugar?</h2>
                                            <p className="text-slate-600 mb-6">
                                                Se te leerá una definición para cada letra. Indica si tu respuesta es
                                                correcta, incorrecta o di "Pasapalabra" para dejarla para la siguiente
                                                ronda.
                                            </p>
                                            {hasSavedGame ? (
                                                <div className="space-y-3">
                                                    <p className="text-sm text-blue-700 font-medium">
                                                        Hay una partida en curso compartida con todos los jugadores.
                                                    </p>
                                                    <button
                                                        onClick={continueGame}
                                                        className="w-full inline-flex items-center justify-center gap-2 px-8 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 text-white font-bold rounded-xl shadow-lg transition-all transform hover:-translate-y-0.5"
                                                    >
                                                        <Play size={20}/>
                                                        Continuar partida
                                                    </button>
                                                    <button
                                                        onClick={() => startGame(true)}
                                                        className="w-full inline-flex items-center justify-center gap-2 px-8 py-3 bg-white hover:bg-slate-50 text-slate-700 font-bold rounded-xl border-2 border-slate-300 transition-all"
                                                    >
                                                        <RotateCcw size={20}/>
                                                        Empezar de cero
                                                    </button>
                                                </div>
                                            ) : (
                                                <button
                                                    onClick={() => startGame(true)}
                                                    className="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-8 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 text-white font-bold rounded-xl shadow-lg transition-all transform hover:-translate-y-0.5"
                                                >
                                                    <Play size={20}/>
                                                    Comenzar Juego
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {gameState === 'playing' && progress.length > 0 && (
                                    <div className="flex flex-col h-full fade-in">
                                        <div className="mb-6 flex flex-col sm:flex-row gap-4">
                                            <div className="flex-1">
                                                <div className="flex items-center justify-between mb-2">
                                                    <div className="flex items-baseline gap-3">
                                                                <span
                                                                    className="text-5xl font-black text-yellow-500 drop-shadow-sm">
                                                                  {questions[currentIndex].letter}
                                                                </span>
                                                        <span
                                                            className="text-sm font-bold uppercase tracking-wider px-3 py-1 bg-slate-100 text-slate-600 rounded-full">
                                                                  {questions[currentIndex].questions[progress[currentIndex].currentQ].type === 'empieza' ? 'Empieza por' : 'Contiene la'}
                                                                </span>
                                                    </div>
                                                    {questions[currentIndex].questions.length > 1 && (
                                                        <div
                                                            className="text-sm font-bold text-orange-500 bg-orange-100 px-3 py-1 rounded-full">
                                                            {progress[currentIndex].currentQ + 1} / {questions[currentIndex].questions.length}
                                                        </div>
                                                    )}
                                                </div>

                                                <div
                                                    className="bg-slate-50 p-5 rounded-2xl border border-slate-200 shadow-inner mt-4 min-h-[120px] flex flex-col justify-center gap-4">
                                                    <p className="text-lg sm:text-xl font-medium leading-relaxed">
                                                        "{questions[currentIndex].questions[progress[currentIndex].currentQ].question}"
                                                    </p>
                                                    <div
                                                        className="p-3 bg-indigo-50 rounded-xl border border-indigo-100">
                                                        <span
                                                            className="text-xs font-bold text-indigo-400 uppercase tracking-wider block mb-1">Respuesta esperada:</span>
                                                        <span className="text-lg font-bold text-indigo-700">
                                                                    {questions[currentIndex].questions[progress[currentIndex].currentQ].answer}
                                                                </span>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="w-full sm:w-32 h-40 sm:h-auto flex-shrink-0">
                                                <div
                                                    className="h-full bg-white p-2 rounded-xl shadow-md border border-slate-200 transform rotate-2 hover:rotate-0 transition-transform duration-300">
                                                    <img
                                                        src={FRIEND_IMAGES[currentPhotoIndex]}
                                                        className="w-full h-full object-cover rounded shadow-inner"
                                                        alt="El novio"
                                                    />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="mt-auto space-y-4">
                                            <div className="grid grid-cols-2 gap-4">
                                                <button onClick={() => handleAnswer(true)}
                                                        className="group flex flex-col items-center justify-center p-4 bg-green-50 hover:bg-green-500 border-2 border-green-500 rounded-2xl transition-all duration-200 shadow-sm hover:shadow-md">
                                                    <div
                                                        className="bg-green-500 group-hover:bg-white p-2 rounded-full mb-2 transition-colors">
                                                        <Check size={24}
                                                               className="text-white group-hover:text-green-600 transition-colors"/>
                                                    </div>
                                                    <span
                                                        className="font-bold text-green-700 group-hover:text-white transition-colors">Correcto</span>
                                                </button>
                                                <button onClick={() => handleAnswer(false)}
                                                        className="group flex flex-col items-center justify-center p-4 bg-red-50 hover:bg-red-500 border-2 border-red-500 rounded-2xl transition-all duration-200 shadow-sm hover:shadow-md">
                                                    <div
                                                        className="bg-red-500 group-hover:bg-white p-2 rounded-full mb-2 transition-colors">
                                                        <X size={24}
                                                           className="text-white group-hover:text-red-600 transition-colors"/>
                                                    </div>
                                                    <span
                                                        className="font-bold text-red-700 group-hover:text-white transition-colors">Incorrecto</span>
                                                </button>
                                            </div>
                                            <button onClick={handlePass}
                                                    className="w-full flex items-center justify-center gap-2 p-4 bg-slate-100 hover:bg-blue-500 text-slate-700 hover:text-white border border-slate-300 hover:border-blue-500 rounded-2xl transition-all duration-200 font-bold text-lg">
                                                <SkipForward size={20}/> Pasapalabra
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {gameState === 'finished' && (
                                    <div className="text-center space-y-6 fade-in w-full max-w-xl mx-auto">
                                        <div
                                            className="p-8 bg-slate-50 rounded-3xl border border-slate-200 shadow-lg relative overflow-hidden">
                                            <div
                                                className="absolute top-0 right-0 p-4 opacity-10 transform rotate-12 scale-150">
                                                <img
                                                    src={FRIEND_IMAGES[Math.floor(Math.random() * FRIEND_IMAGES.length)]}
                                                    className="w-32 h-32 object-cover rounded-full" alt=""/>
                                            </div>

                                            <h2 className="text-4xl font-black text-slate-800 mb-2 relative z-10">¡Juego
                                                Terminado!</h2>
                                            <p className="text-slate-500 mb-8 relative z-10">Aquí están tus resultados
                                                finales.</p>

                                            <div className="grid grid-cols-2 gap-4 mb-8">
                                                <div
                                                    className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                                                    <span
                                                        className="text-5xl font-black text-green-500 drop-shadow-sm">{stats.correct}</span>
                                                    <span
                                                        className="text-sm font-semibold uppercase tracking-wider text-slate-500 mt-2 block">Aciertos</span>
                                                </div>
                                                <div
                                                    className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                                                    <span
                                                        className="text-5xl font-black text-red-500 drop-shadow-sm">{stats.incorrect}</span>
                                                    <span
                                                        className="text-sm font-semibold uppercase tracking-wider text-slate-500 mt-2 block">Errores</span>
                                                </div>
                                            </div>

                                            <div className="mb-8 flex justify-center">
                                                <div
                                                    className="p-3 bg-white rounded-2xl shadow-xl border-4 border-white transform -rotate-2 hover:rotate-0 transition-transform duration-500 max-w-[200px]">
                                                    <img
                                                        src={FRIEND_IMAGES[currentPhotoIndex]}
                                                        className="w-full h-auto rounded-lg"
                                                        alt="Celebración"
                                                    />
                                                    <div
                                                        className="mt-3 font-handwriting text-slate-400 text-xs italic">#CaminoAlAltar
                                                    </div>
                                                </div>
                                            </div>

                                            <button onClick={resetGame}
                                                    className="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-8 py-4 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl shadow-md transition-all">
                                                <RotateCcw size={20}/> Volver a Jugar
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                    <footer
                        className="mt-8 text-center text-sm text-slate-600 bg-white/50 backdrop-blur-sm px-6 py-2 rounded-full relative z-10">
                        Nota: En esta versión tú actúas como el presentador. El progreso se guarda en Firebase y lo ven todos los dispositivos en tiempo real.
                    </footer>
                </div>

                {showJumpScare && (
                    <div
                        className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm fade-in">
                        <div className="relative animate-jump-scare">
                            <img
                                src={WRONG_ANSWER_IMAGE}
                                className="max-h-[85vh] max-w-[90vw] rounded-3xl border-8 border-white shadow-[0_0_50px_rgba(239,68,68,0.5)]"
                                alt="¡INCORRECTO!"
                            />
                            <div
                                className="absolute -bottom-6 left-1/2 -translate-x-1/2 bg-red-600 text-white px-8 py-2 rounded-full font-black text-2xl shadow-xl transform -rotate-2">
                                ¡INCORRECTO!
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RoscoGame/>);
</script>
</body>
</html>
